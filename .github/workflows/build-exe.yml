name: Build Windows EXE

# Builds the Grillo Device Provisioner Windows executable and publishes it as a
# release asset. Push a version tag (e.g. v1.0.1) to cut a release, or run
# manually from the Actions tab to just produce a downloadable build artifact.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Mirrors build_exe.bat (without the interactive `pause`).
      - name: Build executable
        run: |
          pyinstaller --onefile --windowed `
            --name "Grillo Device Provisioner" `
            --add-data "esp32_device_reader.py;." `
            --hidden-import=esptool `
            --hidden-import=serial `
            --hidden-import=serial.tools.list_ports `
            --hidden-import=customtkinter `
            esp32_device_reader_gui.py

      # Always available from the Actions run (handy for manual/dispatch builds).
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grillo-Device-Provisioner-exe
          path: "dist/Grillo Device Provisioner.exe"
          if-no-files-found: error

      # On a version tag, attach the exe to a GitHub Release.
      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/Grillo Device Provisioner.exe"
          fail_on_unmatched_files: true
